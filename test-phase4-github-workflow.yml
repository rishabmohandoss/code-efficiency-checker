# Phase 4 Test File - CI/CD Security Issues
# This is a GitHub Actions workflow with intentional security vulnerabilities
# .github/workflows/vulnerable-ci.yml

name: Vulnerable CI Pipeline (TEST)

on:
  push:
    branches: [ main ]
  pull_request_target:  # CRITICAL: Dangerous - exposes secrets to forks!
    branches: [ main ]

permissions: write-all  # HIGH: Overly permissive!

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # ==========================================
      # RULE 63: SECRETS IN CI/CD LOGS - CRITICAL
      # ==========================================

      - name: Build Application (with secret logging)
        run: |
          # CRITICAL: Echoing secrets to logs!
          echo "API Key: ${{ secrets.API_KEY }}"
          echo "Database password: ${{ secrets.DB_PASSWORD }}"
          echo $STRIPE_SECRET_KEY

          # CRITICAL: Logging environment variables with secrets
          echo "JWT Secret: $JWT_SECRET"
          console.log(process.env.SECRET_API_KEY)

          # CRITICAL: Writing secrets to files that get logged
          echo ${{ secrets.AWS_ACCESS_KEY }} >> build.log
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Deploy with exposed credentials
        run: |
          # HIGH: Secrets in command arguments (visible in process list)
          curl -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" https://api.example.com/deploy
          git clone https://${{ secrets.GITHUB_TOKEN }}@github.com/user/repo.git
          npm publish --token ${{ secrets.NPM_TOKEN }}

      # ==========================================
      # RULE 64: UNVERIFIED DEPENDENCIES - HIGH
      # ==========================================

      - name: Install Dependencies (unsafe)
        run: |
          # HIGH: Using npm install instead of npm ci
          npm install

          # HIGH: yarn without frozen lockfile
          yarn install

          # HIGH: pip without requirements.txt or hash verification
          pip install requests

          # HIGH: Composer without frozen dependencies
          composer install

          # HIGH: Downloading and running arbitrary code
          curl https://example.com/install.sh | bash
          wget -O- https://get.something.com | sudo sh

      # Correct example (should NOT trigger):
      - name: Install Dependencies (correct)
        run: |
          npm ci  # Uses exact versions from package-lock.json
          yarn install --frozen-lockfile
          pip install -r requirements.txt --require-hashes

      # ==========================================
      # RULE 65: MISSING SECURITY SCANS - MEDIUM
      # ==========================================

      # This workflow has build/deploy but NO security scans!
      # Missing: npm audit, snyk test, semgrep, codeql, etc.

      - name: Build Application
        run: npm run build

      - name: Deploy to Production
        run: |
          # Deploying without any security checks!
          ./deploy.sh
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}

      # Correct example (should NOT trigger):
      # - name: Security Scan
      #   run: |
      #     npm audit
      #     npx snyk test
      #     semgrep --config=auto

      # ==========================================
      # RULE 66: OVERLY PERMISSIVE TOKENS - HIGH
      # ==========================================

      # Already flagged at top:
      # permissions: write-all  # Too broad!

      - name: Use GitHub Token with excessive permissions
        run: |
          # Using GITHUB_TOKEN with write-all permissions
          gh api repos/${{ github.repository }}/actions/secrets \
            --method PUT \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}"

      # Using multiple powerful tokens in one workflow
      - name: Deploy with many tokens
        run: |
          # HIGH: Too many different tokens
          echo ${{ secrets.AWS_TOKEN }}
          echo ${{ secrets.AZURE_TOKEN }}
          echo ${{ secrets.GCP_TOKEN }}
          echo ${{ secrets.HEROKU_TOKEN }}
          echo ${{ secrets.VERCEL_TOKEN }}

      # CRITICAL: Secrets exposed to fork pull requests
      # Because we used pull_request_target at the top!
      - name: Run tests from PR (dangerous)
        run: |
          npm test
        env:
          API_KEY: ${{ secrets.API_KEY }}

