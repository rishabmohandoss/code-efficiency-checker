# Phase 6 Test File - Container & Kubernetes Security Issues
# This file demonstrates container and K8s misconfigurations

# ==========================================
# RULE 50: CONTAINER RUNNING AS ROOT - MEDIUM
# ==========================================

# MEDIUM: Dockerfile running as root
# Dockerfile content:
# FROM node:18
# WORKDIR /app
# COPY package*.json ./
# RUN npm install
# COPY . .
# USER root              # DANGEROUS
# EXPOSE 3000
# CMD ["node", "server.js"]

# ==========================================
# RULE 51: EXPOSED DOCKER DAEMON - CRITICAL
# ==========================================

# CRITICAL: Docker daemon exposed on network
# docker run -d -H tcp://0.0.0.0:2375 docker:dind    # VERY DANGEROUS
# dockerd -H tcp://0.0.0.0:2375 &

# CRITICAL: Docker socket mounted in container
# docker run -v /var/run/docker.sock:/var/run/docker.sock myimage

# Environment variables exposing Docker
# export DOCKER_HOST=tcp://192.168.1.100:2375      # Unencrypted!
# export DOCKER_HOST=tcp://0.0.0.0:2375

# ==========================================
# RULE 52: MISSING RESOURCE LIMITS - LOW
